[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
    ".git",
    ".github",
    ".vscode",
    "__pycache__",
]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "N"]
ignore = ["E712"]

[tool.ruff.lint.per-file-ignores]
"plugins/*/test/*.py" = ["E402"]
"plugins/*/tests/*.py" = ["E402"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"

[tool.mypy]
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true
exclude = [
    '^plugins/[^/]+/src/plugin\.py$',
    '^plugins/[^/]+/test/.*\.py$'
]
disable_error_code = [
    "var-annotated",
    "union-attr",
    "arg-type",
    "method-assign",
    "assignment",
    "dict-item",
    "return-value"
]
